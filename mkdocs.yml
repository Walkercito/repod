site_name: repod
site_url: https://walkercito.github.io/repod
site_description: Networking library for multiplayer games in Python
site_author: Walkercito

repo_name: Walkercito/repod
repo_url: https://github.com/Walkercito/repod

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  logo: assets/logo.svg
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Get Started:
    - Installation: get-started/installation.md
    - How it works: get-started/how-it-works.md
  - Tutorial:
    - Building a server: tutorial/server.md
    - Building a client: tutorial/client.md
    - Putting it together: tutorial/together.md
    - Broadcasting: tutorial/broadcasting.md
    - Connections: tutorial/connections.md
    - Pygame integration: tutorial/pygame.md
    - Background server: tutorial/background-server.md
    - Type-safe generics: tutorial/generics.md
    - Async API: tutorial/async-api.md
  - API Reference:
    - Server: reference/server.md
    - Channel: reference/channel.md
    - ConnectionListener: reference/connection-listener.md
    - Client: reference/client.md
    - Protocol: reference/protocol.md
    - Constants: reference/constants.md
    - Wire format: reference/wire-format.md
  - Examples: examples.md
