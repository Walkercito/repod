name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install

      - name: Build
        run: uv build

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with "dist/*.whl" -- python -c "from repod import Server, Channel, ConnectionListener"

      - name: Smoke test (sdist)
        run: uv run --isolated --no-project --with "dist/*.tar.gz" -- python -c "from repod import Server, Channel, ConnectionListener"

      - name: Publish
        run: uv publish
